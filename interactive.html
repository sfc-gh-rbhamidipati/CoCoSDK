<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortex Code Agent SDK — Interactive Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Lato:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

:root{
    --sf:#29B5E8;--sf2:#11567F;--sf3:#75CDD7;
    --bg:#07121F;
    --s1:#0C1E30;--s2:#112640;--s3:#162D49;
    --card:var(--s1);
    --bdr:rgba(255,255,255,.065);--bdr2:rgba(41,181,232,.22);--bdr3:rgba(255,255,255,.12);
    --txt:#F0F6FF;--t2:#9BB4CC;--t3:#4D6878;
    --green:#10b981;--green-bg:rgba(16,185,129,.09);
    --amber:#f59e0b;--amber-bg:rgba(245,158,11,.09);
    --purple:#a855f7;--purple-bg:rgba(168,85,247,.09);
    --orange:#FF9F36;--orange-bg:rgba(255,159,54,.09);
    --red:#ef4444;
    --font-h:'Montserrat','Arial Black',Arial,sans-serif;
    --font-b:'Lato',Arial,sans-serif;
    --font-mono:'SF Mono','Menlo','Consolas',monospace;
    --gap:15px;--r:12px;--r2:7px;
}

html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-b);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(41,181,232,.055) 1px,transparent 1px);background-size:28px 28px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(17,86,127,.2) 0%,transparent 68%)}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.12}
#root{position:relative;z-index:1;width:100vw;height:100vh;overflow:hidden}

/* Syntax highlighting */
.code{background:#04101C;border:1px solid rgba(41,181,232,.13);border-radius:var(--r2);padding:13px 16px;font-family:var(--font-mono);font-size:.82rem;color:#93C5FD;line-height:1.68;overflow-x:auto;white-space:pre;tab-size:4}
.code .kw{color:#7dd3fc;font-weight:600}
.code .fn{color:#67e8f9}
.code .str{color:#86efac}
.code .cm{color:var(--t3);font-style:italic}
.code .op{color:#fca5a5}
.code .dec{color:var(--amber)}
.code .cls{color:var(--purple)}
.code .num{color:var(--orange)}

/* Focus ring animation for chat input */
@keyframes focusGlow{0%{box-shadow:0 0 0 0 rgba(41,181,232,0)}50%{box-shadow:0 0 0 3px rgba(41,181,232,.15)}100%{box-shadow:0 0 0 0 rgba(41,181,232,0)}}
.chat-input:focus{border-color:rgba(41,181,232,.4)!important;animation:focusGlow .6s ease-out}
/* Thinking dots animation */
@keyframes thinkBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-3px)}}
/* Pulse animation for terminal running indicator */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
/* Fade-in for new chat messages */
@keyframes msgFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg-enter{animation:msgFadeIn .25s ease-out}
/* Suggestion chip hover scale */
.suggest-chip{transition:all .15s ease}
.suggest-chip:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(41,181,232,.15)}
/* Run Live button pulse on hover */
@keyframes runPulse{0%{box-shadow:0 0 0 0 rgba(16,185,129,.3)}70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
.run-live-btn:hover{animation:runPulse 1.2s infinite}
/* Terminal slide-in from right */
@keyframes termSlideIn{from{transform:translateX(100%);opacity:.7}to{transform:translateX(0);opacity:1}}
.demo-terminal{animation:termSlideIn .35s cubic-bezier(.22,1,.36,1)}
/* Scrollbar styling for dark panels */
.dark-scroll::-webkit-scrollbar{width:5px}
.dark-scroll::-webkit-scrollbar-track{background:transparent}
.dark-scroll::-webkit-scrollbar-thumb{background:rgba(41,181,232,.2);border-radius:3px}
.dark-scroll::-webkit-scrollbar-thumb:hover{background:rgba(41,181,232,.35)}

/* Terminal markdown — monospace green aesthetic with formatting */
.term-md{font-family:var(--font-mono);font-size:.72rem;line-height:1.7;color:#4ade80}
/* Plain terminal lines — no markdown, just green monospace */
.term-line{font-family:var(--font-mono);font-size:.72rem;line-height:1.7;color:#4ade80;white-space:pre-wrap}
.term-md h1,.term-md h2,.term-md h3,.term-md h4{font-family:var(--font-mono);color:var(--sf);margin:10px 0 4px;font-weight:700;letter-spacing:.02em}
.term-md h1{font-size:.82rem;border-bottom:1px solid rgba(41,181,232,.2);padding-bottom:3px}
.term-md h2{font-size:.78rem}
.term-md h3{font-size:.74rem;color:#67e8f9}
.term-md p{margin:3px 0}
.term-md strong{color:#fff;font-weight:700}
.term-md em{color:#7dd3fc;font-style:italic}
.term-md code{color:#fca5a5;font-family:var(--font-mono);font-size:.72rem}
.term-md pre{background:#050505;border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:8px 12px;overflow-x:auto;margin:6px 0}
.term-md pre code{color:#93C5FD}
.term-md ul,.term-md ol{margin:3px 0 3px 16px;padding:0}
.term-md li{margin:1px 0;color:#4ade80}
.term-md li::marker{color:var(--sf)}
.term-md blockquote{border-left:2px solid var(--sf);margin:6px 0;padding:2px 10px;color:var(--sf)}
.term-md a{color:var(--sf);text-decoration:underline}
.term-md hr{border:none;border-top:1px solid rgba(255,255,255,.06);margin:8px 0}
.term-md table{border-collapse:collapse;width:100%;margin:6px 0;font-size:.7rem}
.term-md th,.term-md td{border:1px solid rgba(74,222,128,.15);padding:3px 8px;text-align:left}
.term-md th{color:var(--sf);font-weight:700;background:rgba(41,181,232,.06)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script>
// Capture marked.parse before Babel transpiles — ensures availability in text/babel blocks
window.__parseMd = (function() {
  var m = window.marked;
  if (!m) return function(t) { return t.replace(/</g, '&lt;').replace(/\n/g, '<br>'); };
  var fn = typeof m.parse === 'function' ? m.parse : (typeof m === 'function' ? m : null);
  if (!fn) return function(t) { return t.replace(/</g, '&lt;').replace(/\n/g, '<br>'); };
  if (typeof m.setOptions === 'function') m.setOptions({ breaks: true, gfm: true });
  return function(t) { return fn(t); };
})();
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ─── Snowflake SVG Logo ─── */
function SfLogo({ label }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" fill="#29B5E8" opacity=".9"/>
      </svg>
      <span style={{fontSize:'.66rem',fontWeight:700,color:'var(--sf)',letterSpacing:'.2em',textTransform:'uppercase',fontFamily:'var(--font-b)'}}>
        {label}
      </span>
    </div>
  );
}

/* ─── Code Block with syntax highlighting ─── */
function CodeBlock({ code, maxHeight }) {
  function highlight(src) {
    return src
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/(#.*$)/gm, '<span class="cm">$1</span>')
      .replace(/("""[\s\S]*?""")/g, '<span class="cm">$1</span>')
      .replace(/\b(import|from|async|await|for|in|if|elif|else|return|def|class|as|with|try|except|raise|pass|not|and|or|is|None|True|False|yield)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(print|isinstance|hasattr|len|enumerate|type|str|int|dict|list|set)\b(?=\s*\()/g, '<span class="fn">$1</span>')
      .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  }
  return (
    <div className="code" style={{maxHeight: maxHeight || 'none', overflowY: maxHeight ? 'auto' : 'visible'}}
         dangerouslySetInnerHTML={{__html: highlight(code)}} />
  );
}

/* ─── Slide wrapper ─── */
function Slide({ active, direction, children, padding }) {
  const style = {
    position:'absolute',top:0,left:0,width:'100%',height:'100%',
    display:'flex',flexDirection:'column',
    padding: padding || '40px 64px 72px',
    opacity: active ? 1 : 0,
    pointerEvents: active ? 'all' : 'none',
    transition:'opacity .38s ease, transform .38s ease',
    transform: active ? 'translateX(0)' : direction === 'prev' ? 'translateX(-44px)' : 'translateX(44px)',
  };
  return <div style={style}>{children}</div>;
}

/* ─── Card component ─── */
function Card({ title, titleColor, highlight: hl, children, style: extraStyle }) {
  return (
    <div style={{
      background: hl ? 'var(--s2)' : 'var(--s1)',
      border: `1px solid ${hl ? 'var(--bdr2)' : 'var(--bdr)'}`,
      borderRadius:'var(--r)',padding:'16px 18px',
      boxShadow:'0 2px 10px rgba(0,0,0,.22)',
      ...extraStyle
    }}>
      {title && <div style={{fontSize:'.82rem',fontWeight:700,color:titleColor||'var(--sf)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:7,fontFamily:'var(--font-b)'}}>{title}</div>}
      {children}
    </div>
  );
}

/* ─── Bullet list ─── */
function Bullets({ items }) {
  return (
    <ul style={{listStyle:'none',padding:0}}>
      {items.map((item, i) => (
        <li key={i} style={{fontSize:'.92rem',color:'var(--t2)',padding:'3.5px 0 3.5px 17px',position:'relative',lineHeight:1.52,fontFamily:'var(--font-b)'}}>
          <span style={{position:'absolute',left:0,color:'var(--sf)',fontWeight:700,fontSize:'1.05rem',lineHeight:1.4}}>›</span>
          <span dangerouslySetInnerHTML={{__html: item}} />
        </li>
      ))}
    </ul>
  );
}

/* ─── Architecture Flow Node ─── */
function FlowDiagram({ nodes }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
      {nodes.map((n, i) => (
        <React.Fragment key={i}>
          <div style={{background:'rgba(17,86,127,.28)',border:'1px solid var(--bdr2)',borderRadius:7,padding:'8px 14px',fontSize:'.83rem',fontWeight:600,color:'var(--txt)',whiteSpace:'nowrap'}}>{n}</div>
          {i < nodes.length - 1 && <span style={{color:'var(--sf)',fontSize:'1.2rem',fontWeight:700}}>→</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ─── Pill badge ─── */
function Pill({ text, color }) {
  const colors = {
    green: {bg:'var(--green-bg)',fg:'var(--green)',bdr:'rgba(16,185,129,.3)'},
    blue: {bg:'rgba(41,181,232,.1)',fg:'var(--sf)',bdr:'rgba(41,181,232,.25)'},
    purple: {bg:'var(--purple-bg)',fg:'var(--purple)',bdr:'rgba(168,85,247,.3)'},
    amber: {bg:'var(--amber-bg)',fg:'var(--amber)',bdr:'rgba(245,158,11,.3)'},
  };
  const c = colors[color] || colors.blue;
  return <span style={{display:'inline-block',padding:'2px 7px',borderRadius:4,fontSize:'.65rem',fontWeight:700,marginLeft:6,verticalAlign:'middle',letterSpacing:'.03em',background:c.bg,color:c.fg,border:`1px solid ${c.bdr}`}}>{text}</span>;
}

/* ─── Run Live Button (for demo slides) ─── */
function RunLiveButton({ demo, onRun }) {
  return (
    <button
      className="run-live-btn"
      onClick={() => onRun(demo)}
      style={{
        marginLeft:'auto',flexShrink:0,
        display:'flex',alignItems:'center',gap:6,
        padding:'7px 16px',borderRadius:8,
        background:'rgba(16,185,129,.12)',border:'1px solid rgba(16,185,129,.35)',
        color:'var(--green)',fontSize:'.72rem',fontWeight:700,fontFamily:'var(--font-b)',
        letterSpacing:'.04em',cursor:'pointer',
        transition:'all .18s ease',
      }}
      onMouseEnter={e => { e.currentTarget.style.background = 'rgba(16,185,129,.22)'; e.currentTarget.style.borderColor = 'rgba(16,185,129,.55)'; }}
      onMouseLeave={e => { e.currentTarget.style.background = 'rgba(16,185,129,.12)'; e.currentTarget.style.borderColor = 'rgba(16,185,129,.35)'; }}
    >
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6V2z"/></svg>
      Run Live
    </button>
  );
}

/* ─── Markdown parser — uses pre-captured window.__parseMd ─── */
const parseMd = window.__parseMd;

/* ─── Demo name mapping ─── */
const DEMO_SCRIPTS = {
  single_turn: 'demo_single_turn.py',
  multi_turn: 'demo_multi_turn.py',
  structured_output: 'demo_structured_output.py',
      chat_embed: 'demo_chat_embed.py',
};

/* ─── Demo Terminal Panel ─── */
function DemoTerminal({ demo, onClose }) {
  const [running, setRunning] = useState(true);
  const [error, setError] = useState(null);
  const [renderKey, setRenderKey] = useState(0);
  const scrollRef = useRef(null);
  // Segments: [{type:'line',text:''}, {type:'md',text:''}, ...]
  const segmentsRef = useRef([]);
  const scriptName = DEMO_SCRIPTS[demo] || `${demo}.py`;

  function appendLine(text) {
    segmentsRef.current = [...segmentsRef.current, {type:'line', text}];
  }
  function appendMd(text) {
    const segs = segmentsRef.current;
    const last = segs[segs.length - 1];
    if (last && last.type === 'md') {
      // Append to existing md segment (mutate for perf, we re-render via key)
      last.text += text;
    } else {
      segmentsRef.current = [...segs, {type:'md', text}];
    }
  }

  // Render segments into HTML
  const renderedHtml = useMemo(() => {
    void renderKey;
    const segs = segmentsRef.current;
    if (!segs.length) return '';
    return segs.map(seg => {
      if (seg.type === 'line') {
        const escaped = seg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="term-line">${escaped}</div>`;
      }
      if (seg.type === 'tool') {
        const escaped = seg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="term-line" style="color:var(--sf)">▸ Tool: ${escaped}</div>`;
      }
      // md segment — parse with marked
      try {
        return parseMd(seg.text);
      } catch(e) {
        return seg.text.replace(/</g,'&lt;').replace(/\n/g,'<br>');
      }
    }).join('');
  }, [renderKey]);

  useEffect(() => {
    let cancelled = false;
    let updateTimer = null;
    // Batch UI updates — re-render at most every 80ms for smooth streaming
    function scheduleRender() {
      if (!updateTimer) {
        updateTimer = setTimeout(() => {
          updateTimer = null;
          if (!cancelled) setRenderKey(k => k + 1);
        }, 80);
      }
    }
    async function run() {
      try {
        const response = await fetch('/api/demo/run', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({demo})
        });
        if (!response.ok) {
          setError(`HTTP ${response.status}: ${response.statusText}`);
          setRunning(false);
          return;
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const {done, value} = await reader.read();
          if (done || cancelled) break;
          buffer += decoder.decode(value, {stream: true});
          const parts = buffer.split('\n');
          buffer = parts.pop();
          for (const line of parts) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.line !== undefined) {
                  if (data.line.startsWith('>> Tool call:')) {
                    const toolName = data.line.replace('>> Tool call: ', '');
                    segmentsRef.current = [...segmentsRef.current, {type:'tool', text:toolName}];
                  } else {
                    appendLine(data.line);
                  }
                  scheduleRender();
                } else if (data.text !== undefined) {
                  appendMd(data.text);
                  scheduleRender();
                } else if (data.exit_code !== undefined || data.status === 'complete' || data.status === 'done') {
                  setRunning(false);
                } else if (data.error) {
                  setError(data.error);
                  setRunning(false);
                }
              } catch(e) {}
            } else if (line.startsWith('event: done')) {
              setRunning(false);
            }
          }
        }
      } catch(e) {
        if (!cancelled) {
          setError('Could not connect to backend at localhost:8765');
          setRunning(false);
        }
      }
      // Final render to catch any trailing content
      if (!cancelled) setRenderKey(k => k + 1);
    }
    run();
    return () => { cancelled = true; if (updateTimer) clearTimeout(updateTimer); };
  }, [demo]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [renderKey]);

  return (
    <div className="demo-terminal" style={{
      width:'42vw',flexShrink:0,height:'100vh',
      background:'#0c0c0c',
      borderLeft:'1px solid rgba(255,255,255,.06)',
      display:'flex',flexDirection:'column',
      zIndex:80,
    }}>
      {/* macOS-style title bar */}
      <div style={{display:'flex',alignItems:'center',padding:'8px 14px',background:'#1c1c1c',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0,position:'relative'}}>
        {/* Traffic light dots */}
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button onClick={onClose} title="Close" style={{width:12,height:12,borderRadius:'50%',background:'#ff5f57',border:'none',cursor:'pointer',padding:0,transition:'opacity .15s'}}
            onMouseEnter={e => e.currentTarget.style.opacity='.8'} onMouseLeave={e => e.currentTarget.style.opacity='1'} />
          <div style={{width:12,height:12,borderRadius:'50%',background:'#febc2e'}} />
          <div style={{width:12,height:12,borderRadius:'50%',background:'#28c840'}} />
        </div>
        {/* Centered title */}
        <div style={{position:'absolute',left:'50%',transform:'translateX(-50%)',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:'.66rem',color:'rgba(255,255,255,.5)',fontFamily:'var(--font-mono)'}}>
            python3 {scriptName}
          </span>
          {running && (
            <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:'pulse 1s infinite',boxShadow:'0 0 6px var(--green)'}} />
          )}
          {!running && !error && (
            <span style={{fontSize:'.58rem',color:'var(--green)',fontFamily:'var(--font-mono)',fontWeight:600}}>EXIT 0</span>
          )}
        </div>
      </div>
      {/* Terminal output */}
      <div ref={scrollRef} className="dark-scroll" style={{flex:1,overflow:'auto',padding:'10px 16px',background:'#0c0c0c'}}>
        {error && <div style={{color:'#ff5f57',fontFamily:'var(--font-mono)',fontSize:'.72rem',marginBottom:8}}>$ error: {error}</div>}
        {renderedHtml ? (
          <div className="term-md" dangerouslySetInnerHTML={{__html: renderedHtml}} />
        ) : (
          running && !error && (
            <div style={{color:'rgba(255,255,255,.3)',fontFamily:'var(--font-mono)',fontSize:'.72rem'}}>
              <span style={{color:'var(--green)'}}>$</span> python3 {scriptName}<br/>
              <span style={{color:'rgba(255,255,255,.2)'}}>Waiting for output...</span>
            </div>
          )
        )}
        {running && <span style={{fontFamily:'var(--font-mono)',color:'#4ade80'}}>█</span>}
      </div>
    </div>
  );
}

  /* ─── LiveChat component ─── */
function LiveChat({ chatState }) {
  const {messages, setMessages, sessionId} = chatState;
  const [input, setInput] = useState('');
  const [isStreaming, setIsStreaming] = useState(false);
  const [backendAvailable, setBackendAvailable] = useState(null);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  const suggestions = [
    "Review threat_report.py for bugs in the security event pipeline",
    "Summarize the security posture from the threat data",
    "Which campaigns have the highest escalation rate?",
    "Flag anomalous threat campaigns and write tests",
  ];

  // Check backend on mount
  useEffect(() => {
    fetch('/api/chat', {method:'OPTIONS'}).then(() => setBackendAvailable(true)).catch(() => setBackendAvailable(false));
  }, []);

  useEffect(() => {
    if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({behavior:'smooth'});
  }, [messages, isStreaming]);

  async function sendMessage(text) {
    if (!text.trim() || isStreaming) return;
    const userMsg = {role:'user', content:text.trim(), toolCalls:[]};
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setIsStreaming(true);

    setMessages(prev => [...prev, {role:'assistant', content:'', toolCalls:[]}]);

    try {
      const response = await fetch('/api/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message: text.trim(), session_id: sessionId})
      });

      if (!response.ok) {
        setMessages(prev => {
          const updated = [...prev];
          updated[updated.length - 1] = {role:'assistant', content:`Error: ${response.status} ${response.statusText}`, toolCalls:[]};
          return updated;
        });
        setIsStreaming(false);
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let accText = '';
      let accTools = [];

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});

        const eventBlocks = buffer.split('\n\n');
        buffer = eventBlocks.pop();

        for (const block of eventBlocks) {
          const lines = block.split('\n');
          let eventType = '';
          let dataStr = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
            if (line.startsWith('data: ')) dataStr = line.slice(6);
          }
          if (!dataStr) continue;
          try {
            const data = JSON.parse(dataStr);
            if (eventType === 'text' && data.text) {
              accText += data.text;
            } else if (eventType === 'tool_call' && data.tool) {
              accTools = [...accTools, data.tool];
            } else if (eventType === 'done') {
              // stream complete
            } else if (!eventType && data.text) {
              accText += data.text;
            } else if (!eventType && data.tool) {
              accTools = [...accTools, data.tool];
            }
          } catch(e) {}

          setMessages(prev => {
            const updated = [...prev];
            updated[updated.length - 1] = {role:'assistant', content:accText, toolCalls:[...accTools]};
            return updated;
          });
        }
      }
    } catch(e) {
      setMessages(prev => {
        const updated = [...prev];
        updated[updated.length - 1] = {role:'assistant', content:'Could not connect to backend. Make sure the server is running at localhost:8765.', toolCalls:[]};
        return updated;
      });
    }
    setIsStreaming(false);
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();
      sendMessage(input);
    }
  }

  return (
    <div style={{background:'#0a0f1a',border:'1px solid rgba(255,255,255,.08)',borderRadius:14,overflow:'hidden',maxWidth:540,width:'100%',display:'flex',flexDirection:'column',maxHeight:420}}>

/* ─── Thinking dots animation ─── */
function ThinkingDots() {
  const [dots, setDots] = useState('');
  useEffect(() => {
    const t = setInterval(() => setDots(p => p.length >= 3 ? '' : p + '.'), 400);
    return () => clearInterval(t);
  }, []);
  return <span>{dots}</span>;
}

            <div key={s.n} style={{background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:12,padding:'13px 18px',display:'grid',gridTemplateColumns:'32px 1fr auto',gap:14,alignItems:'center'}}>
              <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(41,181,232,.15)',border:'1px solid rgba(41,181,232,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',fontWeight:700,color:'var(--sf)'}}>{s.n}</div>
              <div>
                <div style={{fontSize:'.83rem',color:'var(--txt)',fontWeight:500}}>{s.text}</div>
                <div style={{fontSize:'.71rem',color:'var(--t2)',marginTop:2}}>{s.sub}</div>
              </div>
              <div style={{fontSize:'.68rem',color:'var(--t3)',whiteSpace:'nowrap',fontWeight:500}}>{s.owner}</div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Card title="Resources" highlight>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                {label:'Cortex REST API',desc:'OpenAI & Anthropic-compatible endpoint'},
                {label:'Cortex Agents REST API',desc:'Multi-tool agent orchestration'},
                {label:'Cortex Code Agent SDK Docs',desc:'Python & TypeScript reference'},
                {label:'Cortex Search',desc:'Semantic search over documents & tables'},
              ].map((r,i) => (
                <div key={i} style={{padding:'8px 12px',background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:8}}>
                  <div style={{fontSize:'.78rem',fontWeight:600,color:'var(--sf)'}}>{r.label}</div>
                  <div style={{fontSize:'.68rem',color:'var(--t3)',marginTop:2}}>{r.desc}</div>
                </div>
              ))}
            </div>
          </Card>

          <div style={{background:'rgba(41,181,232,.05)',borderLeft:'3px solid var(--sf)',borderRadius:'0 10px 10px 0',padding:'14px 18px'}}>
            <div style={{fontSize:'.88rem',color:'var(--t2)',lineHeight:1.6,fontStyle:'italic'}}>
              "The demo scripts are self-contained — clone the repo, set your Snowflake credentials, and run. No infrastructure setup needed."
            </div>
            <div style={{fontSize:'.71rem',color:'var(--t3)',fontWeight:600,marginTop:7}}>
              Try it: python demo_single_turn.py
            </div>
          </div>

          <Card title="Safe Harbor" titleColor="var(--t3)" style={{padding:'12px 14px'}}>
            <div style={{fontSize:'.7rem',color:'var(--t3)',lineHeight:1.6}}>
              Roadmap items are directional and not a commitment. Actual timing may differ. See Snowflake's Safe Harbor statement.
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════ */
const SLIDES = [
  { component: SlideTitle, label: 'Title', demo: null },
  { component: SlideWhatIs, label: 'What is SDK', demo: null },
  { component: SlideArchitecture, label: 'Architecture', demo: null },
  { component: SlideDemo1, label: 'Demo: Single-Turn', demo: 'single_turn' },
  { component: SlideDemo2, label: 'Demo: Multi-Turn', demo: 'multi_turn' },
  { component: SlideDemo3, label: 'Demo: Structured', demo: 'structured_output' },
  { component: SlideChatEmbed, label: 'Live Chat', demo: 'chat_embed' },
  { component: SlideGovernance, label: 'Governance & Cost', demo: null },
  { component: SlideUnstructured, label: 'Unstructured Data', demo: null },
  { component: SlideNextSteps, label: 'Next Steps', demo: null },
];



function App() {
  const [current, setCurrent] = useState(0);
  const [prevSlide, setPrevSlide] = useState(-1);
  const [activeTerminal, setActiveTerminal] = useState(null); // {demo, slideIdx}
  const N = SLIDES.length;

  // Persistent chat state — survives navigation away from slide 7
  const [chatMessages, setChatMessages] = useState([]);
  const [chatSessionId] = useState(() => crypto.randomUUID());
  const chatState = {messages: chatMessages, setMessages: setChatMessages, sessionId: chatSessionId};

  const goTo = useCallback((n) => {
    if (n === current || n < 0 || n >= N) return;
    setPrevSlide(current);
    setCurrent(n);
    setTimeout(() => setPrevSlide(-1), 500);
  }, [current, N]);

  const go = useCallback((d) => goTo(current + d), [current, goTo]);


  function handleRunDemo(demo) {
    setActiveTerminal({demo, slideIdx: current});
  }

  useEffect(() => {
    const handler = (e) => {
      // Don't capture keys when typing in chat input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      else if (e.key === 'End') { e.preventDefault(); goTo(N - 1); }
      else if (e.key === 'Escape' && activeTerminal) { setActiveTerminal(null); }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [go, goTo, N, activeTerminal]);

  const termOpen = !!activeTerminal;
  const TERM_WIDTH = '42vw';

  return (
    <>
      {/* Main flex container: slides + terminal side panel */}
      <div style={{display:'flex',width:'100vw',height:'100vh',overflow:'hidden'}}>

        {/* Slide area — shrinks when terminal opens */}
        <div style={{
          flex:1,position:'relative',height:'100vh',overflow:'hidden',
          transition:'flex .4s cubic-bezier(.22,1,.36,1)',
          minWidth:0,
        }}>
          {SLIDES.map((s, i) => {
            const active = i === current;
            const direction = i === prevSlide ? 'prev' : 'next';
            const SlideComponent = s.component;
            const extraProps = {};
            if (s.demo) extraProps.onRunDemo = handleRunDemo;
            if (i === 6) extraProps.chatState = chatState;
            return (
              <Slide key={i} active={active} direction={direction}
                     padding={i === 6 ? '20px 44px 72px' : undefined}>
                <SlideComponent {...extraProps} />
              </Slide>
            );
          })}
        </div>

        {/* Terminal right panel */}
        {termOpen && (
          <DemoTerminal
            demo={activeTerminal.demo}
            onClose={() => setActiveTerminal(null)}
          />
        )}
      </div>

      {/* Progress bar */}
      <div style={{position:'fixed',top:0,left:0,height:3,background:'linear-gradient(90deg,var(--sf),var(--sf3))',width:`${((current+1)/N)*100}%`,transition:'width .38s ease',zIndex:200}} />

      {/* Navigation */}
      <div style={{
        position:'fixed',bottom:16,
        left: termOpen ? `calc((100vw - ${TERM_WIDTH}) / 2)` : '50%',
        transform:'translateX(-50%)',
        display:'flex',alignItems:'center',gap:10,
        background:'rgba(7,18,31,.97)',border:'1px solid var(--bdr3)',borderRadius:14,
        padding:'8px 16px',backdropFilter:'blur(24px)',zIndex:100,
        boxShadow:'0 6px 28px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.04) inset',
        transition:'left .4s cubic-bezier(.22,1,.36,1)',
      }}>
        <button onClick={() => go(-1)} disabled={current === 0}
          style={{background:'none',border:'1px solid var(--bdr)',borderRadius:6,color: current === 0 ? 'var(--t3)' : 'var(--t2)',padding:'5px 13px',fontSize:'.72rem',fontFamily:'var(--font-b)',fontWeight:600,cursor: current === 0 ? 'not-allowed' : 'pointer',opacity: current === 0 ? .25 : 1,transition:'all .16s',letterSpacing:'.03em'}}
          onMouseEnter={e => { if (current !== 0) { e.currentTarget.style.borderColor = 'rgba(41,181,232,.3)'; e.currentTarget.style.color = 'var(--sf)'; }}}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bdr)'; e.currentTarget.style.color = current === 0 ? 'var(--t3)' : 'var(--t2)'; }}>
          ← Prev
        </button>

        {/* Dots */}
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          {SLIDES.map((_, i) => (
            <button key={i} onClick={() => goTo(i)}
              style={{
                width: i === current ? 14 : 5,height:5,borderRadius: i === current ? 3 : '50%',
                background: i === current ? 'var(--sf)' : 'var(--t3)',
                transition:'all .22s',cursor:'pointer',border:'none',padding:0,
                boxShadow: i === current ? '0 0 6px rgba(41,181,232,.45)' : 'none',
              }}
              title={SLIDES[i].label}
            />
          ))}
        </div>

        <span style={{fontSize:'.64rem',color:'var(--t3)',minWidth:40,textAlign:'center',fontFamily:'var(--font-b)',fontWeight:600,letterSpacing:'.06em'}}>
          {current + 1} / {N}
        </span>

        <button onClick={() => go(1)} disabled={current === N - 1}
          style={{background:'none',border:'1px solid var(--bdr)',borderRadius:6,color: current === N-1 ? 'var(--t3)' : 'var(--t2)',padding:'5px 13px',fontSize:'.72rem',fontFamily:'var(--font-b)',fontWeight:600,cursor: current === N-1 ? 'not-allowed' : 'pointer',opacity: current === N-1 ? .25 : 1,transition:'all .16s',letterSpacing:'.03em'}}
          onMouseEnter={e => { if (current !== N-1) { e.currentTarget.style.borderColor = 'rgba(41,181,232,.3)'; e.currentTarget.style.color = 'var(--sf)'; }}}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bdr)'; e.currentTarget.style.color = current === N-1 ? 'var(--t3)' : 'var(--t2)'; }}>
          Next →
        </button>

      </div>

      {/* Keyboard shortcut hint — visible on title slide */}
      {current === 0 && (
        <div style={{
          position:'fixed',bottom:62,
          left: termOpen ? `calc((100vw - ${TERM_WIDTH}) / 2)` : '50%',
          transform:'translateX(-50%)',
          fontSize:'.58rem',color:'var(--t3)',fontFamily:'var(--font-mono)',letterSpacing:'.04em',
          opacity:.65,animation:'msgFadeIn .5s ease-out',
          transition:'left .4s cubic-bezier(.22,1,.36,1)',
        }}>
          ← → arrow keys to navigate · ESC to close terminal
        </div>
      )}
    </>
  );
}

/* ─── Particle Canvas ─── */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  pts = Array.from({length: 55}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - .5) * .35, vy: (Math.random() - .5) * .35,
    r: Math.random() * 1.8 + .8
  }));
}
resize();
window.addEventListener('resize', resize);
function draw() {
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(41,181,232,0.35)'; ctx.fill();
  });
  for (let i = 0; i < pts.length; i++)
    for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 130) {
        ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
        ctx.strokeStyle = `rgba(41,181,232,${(1 - d / 130) * .12})`;
        ctx.lineWidth = .8; ctx.stroke();
      }
    }
  requestAnimationFrame(draw);
}
draw();

/* ─── Mount React App ─── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
